  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What exactly will my child learn at Sparvi Lab?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Your child will learn problem-solving, logical reasoning, creativity, and learning agility through hands-on learning across computational thinking, creative coding, electronics and robotics, game development, and early AI concepts. The goal is a child who can face new challenges confidently and learn new technologies faster."
        }
      },
      {
        "@type": "Question",
        "name": "What age groups does Sparvi Lab serve?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sparvi Lab is designed for children ages 6–17. Students are placed into age bands with a progressive curriculum that grows year by year. Placement is based on age and a simple onboarding check. Advanced children can be placed higher; those who need stronger foundations start from the right step without pressure."
        }
      },
      {
        "@type": "Question",
        "name": "Do students need prior coding or robotics experience?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Prior experience is not required. Many students join with zero background and start from the foundations. If your child already has experience, we challenge them with deeper tasks and more advanced projects."
        }
      },
      {
        "@type": "Question",
        "name": "Do parents need to attend or help during sessions?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "In most cases, parents do not need to sit next to the child. Sessions are guided and structured. For ages 6–8, light support at the beginning is recommended mainly for setup and focus. We also run parent guidance sessions so you know how to support your child without doing the work for them."
        }
      },
      {
        "@type": "Question",
        "name": "What happens if we miss a live class?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "If you miss a session, your child will not be left behind. We provide a clear catch-up plan, and depending on the program you may receive a session recording or guided summary. We also offer support time to help the student catch up and rejoin confidently."
        }
      },
      {
        "@type": "Question",
        "name": "Is Sparvi Lab online or in-person?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sparvi Lab can be delivered online and in-person depending on your location and program schedule. Online sessions are interactive and hands-on, not passive watching. In-person sessions follow the same curriculum with more physical collaboration."
        }
      },
      {
        "@type": "Question",
        "name": "What equipment do we need at home for online learning?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "In most cases, you need a laptop or desktop computer and a stable internet connection. For some tracks, the electronics kit is required. We provide a short setup guide so everything is ready before the first session."
        }
      }
    ]
  }
  </script>
